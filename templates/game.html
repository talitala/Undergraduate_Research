<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of LAIfe &mdash; {{ player_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-game" data-hunger="{{ hunger }}" data-thirst="{{ thirst }}" data-social="{{ social }}">

    <header>
        <div class="logo">Game of <span>LAI</span>fe</div>
        <div id="timer-display">00:00:00</div>
        <div class="player-tag">player: <strong>{{ player_name }}</strong></div>
    </header>

    <main>
        <!-- STAT BARS -->
        <div class="stats-panel">
            <div class="panel-label">// vital signs</div>

            <div class="stat-card hunger" id="hunger-card">
                <div class="stat-header">
                    <span class="stat-name">Hunger</span>
                    <span class="stat-value" id="hunger-value">{{ hunger }}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill" id="hunger-fill" style="width: {{ hunger }}%;"></div>
                </div>
                <div class="stat-footer">
                    <span class="stat-status" id="hunger-status">nominal</span>
                    <span class="stat-clicks">fed: <span id="hunger-clicks">0</span>&times;</span>
                </div>
            </div>

            <div class="stat-card thirst" id="thirst-card">
                <div class="stat-header">
                    <span class="stat-name">Thirst</span>
                    <span class="stat-value" id="thirst-value">{{ thirst }}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill" id="thirst-fill" style="width: {{ thirst }}%;"></div>
                </div>
                <div class="stat-footer">
                    <span class="stat-status" id="thirst-status">nominal</span>
                    <span class="stat-clicks">hydrated: <span id="thirst-clicks">0</span>&times;</span>
                </div>
            </div>

            <div class="stat-card social" id="social-card">
                <div class="stat-header">
                    <span class="stat-name">Social</span>
                    <span class="stat-value" id="social-value">{{ social }}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill" id="social-fill" style="width: {{ social }}%;"></div>
                </div>
                <div class="stat-footer">
                    <span class="stat-status" id="social-status">nominal</span>
                    <span class="stat-clicks">called: <span id="social-clicks">0</span>&times;</span>
                </div>
            </div>

            <!-- EVENT LOG -->
            <div class="panel-label">// event log</div>
            <div class="log-card" id="log"></div>
        </div>

        <!-- ACTIONS -->
        <div class="actions-panel">
            <div class="control-card">
                <div class="panel-label">// controls</div>
                <button class="ctrl-btn" id="play-btn" onclick="startGame()">&#9654; Start Game</button>
                <button class="ctrl-btn" id="sim-btn" onclick="startSim()" disabled>&#9889; Run Simulator</button>
            </div>

            <div class="action-card">
                <h2>// take action</h2>
                <div class="action-buttons">
                    <button class="act-btn hunger-btn" id="eat-btn" onclick="doAction('eat', 'hunger')" disabled>
                        <span class="btn-icon">&#127828;</span> Eat something
                    </button>
                    <button class="act-btn thirst-btn" id="drink-btn" onclick="doAction('drink', 'thirst')" disabled>
                        <span class="btn-icon">&#128167;</span> Drink water
                    </button>
                    <button class="act-btn social-btn" id="call-btn" onclick="doAction('call', 'social')" disabled>
                        <span class="btn-icon">&#128222;</span> Call a friend
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- GAME OVER OVERLAY -->
    <div id="game-over-overlay">
        <div class="go-label">// session terminated</div>
        <div class="go-title">GAME OVER</div>
        <div class="go-score">survived for <span id="final-time">00:00:00</span></div>
        <button class="go-restart" onclick="location.href='/'">&#8635; Play Again</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
